<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="accText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.36" r="0.6">
      <stop offset="0" stop-color="#241a2e"/>
      <stop offset="1" stop-color="#0d1117"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="#0d1117"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- ===== [ ✓✓✓ ] motif (scaled) ===== -->
  <g transform="translate(208,93) scale(1.2)">
    <!-- brackets -->
    <path d="M188 40 L150 40 L150 180 L188 180"
          fill="none" stroke="url(#acc)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M532 40 L570 40 L570 180 L532 180"
          fill="none" stroke="url(#acc)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- three checkmarks, grey -> pink -->
    <path d="M232 112 L246 126 L270 96" fill="none" stroke="#6b7482" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M342 112 L356 126 L380 96" fill="none" stroke="#ec88c4" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M452 112 L466 126 L490 96" fill="none" stroke="url(#acc)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="640" y="430" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="700" font-size="76"
        letter-spacing="-2" fill="#e6eaf0">ai-<tspan fill="url(#accText)">test</tspan>-kit</text>

  <!-- ===== TAGLINE ===== -->
  <text x="640" y="491" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="400" font-size="24"
        letter-spacing="0" fill="#9aa4b2">Mock models, content builders and stream helpers for the AI SDK</text>
</svg>
